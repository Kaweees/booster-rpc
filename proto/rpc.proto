syntax = "proto3";

package booster.proto.rpc;

import "base.proto";
import "entity.proto";

enum RobotMode {
  MODE_UNKNOWN = 0;
  MODE_DAMPING = 1;
  MODE_PREPARE = 2;
  MODE_WALKING = 3;
  MODE_CUSTOM = 4;
}

message GetRobotStatusRequest {
  string serial_id = 1;
}

message GetRobotStatusResponse {
  RobotMode mode = 1;
  booster.proto.RobotInfo robot_info = 2;
}

message RobotMoveRequest {
  float vx = 1;
  float vy = 2;
  float vyaw = 3;
}

message RobotChangeModeRequest {
  RobotMode mode = 1;
}

message RobotRotateHeadRequest {
  float pitch = 1;
  float yaw = 2;
}

service RobotGrpc {
  rpc RobotRequest(booster.proto.RpcRequest) returns (booster.proto.RpcResponse);
}
